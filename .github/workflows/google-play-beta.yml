name: Google Play Beta Track

on:
  push:
    tags:
      - 'v-[0-9][0-9][0-9][0-9].[0-9][0-9]-[0-9][0-9]beta'

jobs:
  publish-beta:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: google-play-beta
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Write Play service account
        run: echo '${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}' > "$RUNNER_TEMP/play-account.json"

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Decode keystore
        run: printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build and publish release bundle to beta
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          PLAY_SERVICE_ACCOUNT_JSON_PATH: ${{ runner.temp }}/play-account.json
          PLAY_TRACK: beta
        run: ./gradlew --no-daemon bundleRelease publishReleaseBundle

      - name: Upload AAB artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: release-bundle
          path: app/build/outputs/bundle/release/*.aab
